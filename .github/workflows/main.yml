name: Attrition Data Pipeline

permissions:
  contents: write

on:
  push:
    branches:
      - main

  workflow_dispatch:

  schedule:
    - cron: "0 5 * * *"

jobs:

  run-pipeline:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pandas numpy

      - name: Run pipeline
        run: |
          python scripts/pipeline.py

      - name: Commit updated dataset
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add processed_attrition_dataset.csv

          git diff --quiet && git diff --staged --quiet || git commit -m "Automated dataset update"

          git push
